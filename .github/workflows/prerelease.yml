name: Prerelease (premain)

on:
  push:
    branches: ["premain"]
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Release Please (Prerelease)
        id: release
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          target-branch: premain
          config-file: release-please-config.premain.json
          manifest-file: .release-please-manifest.premain.json
          skip-github-pull-request: true

      - name: Checkout (for release assets)
        if: steps.release.outputs.release_created == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Python raster toolchain
        if: steps.release.outputs.release_created == 'true'
        run: python3 -m pip install --quiet --user cairosvg Pillow

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        if: steps.release.outputs.release_created == 'true'
        with:
          node-version: "24.13.1"

      - name: Install npm dependencies
        if: steps.release.outputs.release_created == 'true'
        working-directory: ts
        run: npm ci

      - name: Rebuild raster assets
        if: steps.release.outputs.release_created == 'true'
        run: python3 scripts/build-assets.py

      - name: Build prerelease tarball
        if: steps.release.outputs.release_created == 'true'
        run: scripts/build-release-assets.sh "${{ steps.release.outputs.version }}" dist

      - name: Upload prerelease asset (immutable draft → publish)
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          if [[ -z "${TAG_NAME}" ]]; then
            echo "release-assets: FAIL (missing tag_name output)" >&2
            exit 1
          fi

          is_draft="$(gh release view "${TAG_NAME}" --json isDraft --jq '.isDraft')"
          if [[ "${is_draft}" != "true" ]]; then
            echo "release-assets: FAIL (release is already published; immutable releases prevent re-uploading assets)" >&2
            exit 1
          fi

          asset="dist/theory-cloud-design-${VERSION}.tgz"
          if [[ ! -f "${asset}" ]]; then
            echo "release-assets: FAIL (${asset} missing)" >&2
            exit 1
          fi

          mapfile -t existing_assets < <(gh release view "${TAG_NAME}" --json assets --jq '.assets[].name' 2>/dev/null || true)
          asset_name="$(basename "${asset}")"
          if printf '%s\n' "${existing_assets[@]}" | grep -Fxq "${asset_name}"; then
            echo "release-assets: skip existing ${asset_name}"
          else
            gh release upload "${TAG_NAME}" "${asset}"
          fi

          gh release edit "${TAG_NAME}" --draft=false --prerelease
