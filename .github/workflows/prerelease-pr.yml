name: Prerelease PR (premain)

on:
  push:
    branches: ["premain"]
    # Ignore ONLY files release-please itself writes exclusively, so its
    # own merge commits don't re-trigger this workflow. Developer-
    # editable files (README.md, ts/package.json, ts/package-lock.json)
    # must NOT live here — a commit that touches only those files is a
    # legitimate release signal and would otherwise be silently skipped
    # by GitHub Actions' path filter (see theory-cloud-design#12 / #13
    # postmortem).
    paths-ignore:
      - ".release-please-manifest.premain.json"
      - "CHANGELOG.md"
      - "VERSION"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    # Do not let a release-please bookkeeping merge open another release PR.
    # The paired release workflow publishes the tag/release for that merge.
    if: ${{ github.event_name != 'push' || (!contains(github.event.head_commit.message, 'release-please--branches--premain') && !contains(github.event.head_commit.message, 'chore(premain): release') && !contains(github.event.head_commit.message, 'release(premain):')) }}
    runs-on: ubuntu-latest
    steps:
      - name: Release Please (PR only)
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          target-branch: premain
          config-file: release-please-config.premain.json
          manifest-file: .release-please-manifest.premain.json
          skip-github-release: true
