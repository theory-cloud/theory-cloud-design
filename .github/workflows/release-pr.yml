name: Release PR (main)

on:
  push:
    branches: ["main"]
    # Ignore ONLY files release-please itself writes exclusively, so its
    # own merge commits don't re-trigger this workflow. Developer-
    # editable files (README.md, ts/package.json, ts/package-lock.json)
    # must NOT live here — a commit that touches only those files is a
    # legitimate release signal and would otherwise be silently skipped
    # by GitHub Actions' path filter (see theory-cloud-design#12 / #13
    # postmortem).
    paths-ignore:
      - ".release-please-manifest.json"
      - "CHANGELOG.md"
      - "VERSION"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Release Please (PR only)
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-release: true
