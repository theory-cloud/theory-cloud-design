<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Theory Cloud">
  <title>Theory Cloud — social / OG card</title>
  <!--
    Social / OG card. Brand-doc references:
      §16 Creative North Star — "intelligence made reliable."
      §27.C Color Standards — Midnight ground; gradient reserved for
        launch / hero moments, which an OG card qualifies as.
      §11 UI / Product Styling Guidance — modular rectangular segmentation
        with one curved highlight. The orbital motif is the single
        curved gesture; the rest of the composition is orthogonal.

    Composition (1200 × 630):
      - Midnight ground across the full card.
      - Master icon centered-left at 320 × 320 — the canonical 64-unit
        icon inside a `transform="translate(...) scale(5)"` wrapper so
        every radius, fill-opacity, and stroke-width is exactly what
        the primary icon uses. No hand-scaled stroke widths; the
        transform does the work.
      - Right-side orbital accent — three concentric quarter arcs in
        the Core Blue → Violet Signal gradient, at a larger scale than
        the icon's internal arcs, echoing the same geometry motif.
      - No wordmark text. v0.1.0 does not ship a custom
        "Adjusted Neutral Sans" wordmark asset (§23, §25); rendering
        the wordmark via a system-font fallback would be an
        approximation that drifts between renderers and breaks the
        raster-parity gate. The wordmark returns as a vector asset
        once it is locked.
  -->
  <defs>
    <linearGradient id="og-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2EA7FF"/>
      <stop offset="1" stop-color="#7A5CFF"/>
    </linearGradient>
    <linearGradient id="og-icon-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2EA7FF"/>
      <stop offset="1" stop-color="#7A5CFF"/>
    </linearGradient>
    <linearGradient id="og-icon-inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4F8FF" stop-opacity="1"/>
      <stop offset="1" stop-color="#F4F8FF" stop-opacity="0.82"/>
    </linearGradient>
  </defs>

  <!-- Midnight ground -->
  <rect x="0" y="0" width="1200" height="630" fill="#081226"/>

  <!-- Right-side orbital accent: three concentric quarter arcs,
       centered at (1080, 520). Larger-radius variant of the icon's
       own internal arcs — same geometric language, bigger scale. -->
  <g fill="none" stroke="url(#og-accent)" stroke-linecap="round" stroke-width="6">
    <path d="M1380 520 A300 300 0 0 1 1080 820" stroke-opacity="0.55"/>
    <path d="M1290 520 A210 210 0 0 1 1080 730" stroke-opacity="0.75"/>
    <path d="M1200 520 A120 120 0 0 1 1080 640"/>
  </g>

  <!-- Master icon at 320 × 320, positioned at (180, 155) — vertically
       centered on 630 and anchored with a generous 180 px left margin.
       Geometry is the canonical 64-unit icon scaled ×5; every radius
       and stroke-width is inherited directly from the primary icon. -->
  <g transform="translate(180 155) scale(5)">
    <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#og-icon-bg)"/>
    <g fill="url(#og-icon-inner)">
      <rect x="11" y="11"  width="18" height="8"  rx="1.5"/>
      <rect x="11" y="22"  width="18" height="13" rx="1.5" fill-opacity="0.78"/>
      <rect x="11" y="38"  width="18" height="15" rx="1.5" fill-opacity="0.55"/>
    </g>
    <g fill="none" stroke="#F4F8FF" stroke-linecap="round" stroke-width="2.75">
      <path d="M53 32 A21 21 0 0 1 32 53"/>
      <path d="M45 32 A13 13 0 0 1 32 45" stroke-opacity="0.78"/>
      <path d="M37 32 A5 5 0 0 1 32 37"   stroke-opacity="0.55"/>
    </g>
    <circle cx="32" cy="32" r="1.25" fill="#F4F8FF"/>
  </g>
</svg>
