<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Theory Cloud">
  <title>Theory Cloud (monochrome, light on dark)</title>
  <!--
    Monochrome light-on-dark variant.

    Brand-doc §27.E Monochrome rules: "Maintain approved one-color
    versions in pure white, graphite/near-black, single dark brand
    tone." This is the pure-white variant, drawn in Ice White on a
    transparent ground so the mark reads on Midnight, black, or
    other controlled dark surfaces.

    Geometry is identical to the full-color mark at assets/icon.svg;
    only the fill changes. The same translate+scale wrapper keeps the
    two variants pixel-parity when rastered at the same size.
  -->
  <g fill="#F4F8FF" transform="translate(15.006 4) scale(0.2866)">
    <path d="M118.58,0v115.18H.13C3.65,52.64,55.02,2.51,118.58,0Z"/>
    <path d="M65.28,125.01v70.09C29.48,190.73,1.46,161.18,0,125.01h65.28Z"/>
    <path d="M75.1,125.01h43.49s0,26.88,0,26.88c0,24.02-19.47,43.49-43.49,43.49h0s0-70.37,0-70.37Z"/>
  </g>
</svg>
